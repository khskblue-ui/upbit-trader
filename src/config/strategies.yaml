strategies:
  - name: volatility_breakout
    enabled: true
    markets:
      - KRW-BTC
      - KRW-ETH
    timeframe: "1d"
    params:
      k_value: 0.5

  - name: rsi_bollinger
    enabled: false
    markets:
      - KRW-BTC
    timeframe: "1h"
    params:
      rsi_period: 14
      bb_period: 20
      bb_std: 2.0

  - name: macd_momentum
    enabled: false
    markets:
      - KRW-BTC
    timeframe: "1h"
    params:
      fast: 12
      slow: 26
      signal_period: 9
      volume_factor: 1.5
